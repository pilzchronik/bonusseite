<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pilz-Chronik">
  <style>
    /* currentColor = nimmt die CSS-Farbe des Eltern-Elements an,
       damit das Logo im Master-Layout in Altrosa/Creme erscheint
       und nicht wie das Original in Hellblau. */
    .ls { stroke: currentColor; fill: none; stroke-linecap: round; }
    .lo { fill: currentColor; }
    .lt { fill: currentColor; }
  </style>
  <!-- P -->
  <text class="lt" x="200" y="200"
    text-anchor="middle" dominant-baseline="central"
    font-family="Barlow, 'Helvetica Neue', Arial, sans-serif"
    font-size="120" font-weight="700">P</text>
  <!-- Ring 1: 6 Speichen, dicker fuer kleine Anzeige -->
  <g class="ls" stroke-width="6">
    <line x1="276" y1="200" x2="296" y2="200"/>
    <line x1="238" y1="266" x2="250" y2="287"/>
    <line x1="162" y1="266" x2="150" y2="287"/>
    <line x1="124" y1="200" x2="104" y2="200"/>
    <line x1="162" y1="134" x2="150" y2="113"/>
    <line x1="238" y1="134" x2="250" y2="113"/>
  </g>
  <g class="lo">
    <circle cx="296" cy="200" r="9"/>
    <circle cx="250" cy="287" r="9"/>
    <circle cx="150" cy="287" r="9"/>
    <circle cx="104" cy="200" r="9"/>
    <circle cx="150" cy="113" r="9"/>
    <circle cx="250" cy="113" r="9"/>
  </g>
  <!-- Ring 2: 6 Speichen, schlanker -->
  <g class="ls" stroke-width="3.5">
    <line x1="318" y1="200" x2="346" y2="200"/>
    <line x1="259" y1="300" x2="273" y2="325"/>
    <line x1="141" y1="300" x2="127" y2="325"/>
    <line x1="82"  y1="200" x2="54"  y2="200"/>
    <line x1="141" y1="100" x2="127" y2="75"/>
    <line x1="259" y1="100" x2="273" y2="75"/>
  </g>
  <g class="lo">
    <circle cx="346" cy="200" r="6"/>
    <circle cx="273" cy="325" r="6"/>
    <circle cx="127" cy="325" r="6"/>
    <circle cx="54"  cy="200" r="6"/>
    <circle cx="127" cy="75"  r="6"/>
    <circle cx="273" cy="75"  r="6"/>
  </g>
</svg>
